name: wearcast
description: "날씨 기반 옷차림 추천 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Network
  dio: ^5.7.0

  # Navigation
  go_router: ^14.8.1

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_analytics: ^11.5.1

  # UI
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  permission_handler: ^11.4.0
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.4

  # Testing
  mocktail: ^1.0.4

  # App Icon
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/character/base/
    - assets/character/overlay/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: false
  min_sdk_android: 21
